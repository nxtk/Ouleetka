meta:
  engine: 4.0.5
  name: ouleetka
  version: 0.1
  ref: "ouleetka v0.1"
  author: nxtk
  url: https://github.com/nxtk/ouleetka

  footprints:
    key_switch: &fp_key_switch ceoloide/switch_choc_v1_v2
    reset_switch: &fp_reset_switch "ceoloide/reset_switch_smd_side"
    power_switch: &fp_power_switch "ceoloide/power_switch_smd_side"
    mounting_hole: &fp_mounting_hole "ceoloide/mounting_hole"
    mcu: &fp_mcu "ceoloide/nice_nano"
    oled: &fp_oled "ceoloide/display_ssd1306_nice_view"
    battery_connector: &fp_fp_battery_connector "ceoloide/battery_connector_jst_ph_2"
    diode: &fp_diode "ceoloide/diode_tht_sod123"

units:
  $default_autobind: 0
  small_tolerance: 0.15
  medium_tolerance: 0.25
  large_tolerance: 0.5

  u: 17
  U: 17
  kx: 17 # spacing between key centers (X-axis)
  ky: 17 # spacing between key centers (Y-axis)
  kco: 13.8 # key cutout hole width (cherry, choc v2: 14, choc v1: 13.8)
  kch: 16.5 # keycap height (cherry: 18, choc: 16.5, choc CFX 16.5)
  kcw: 16.5 # keycap width (cherry: 18, choc: 17.5, choc CFX 16.5)

  led_pos_x: 0 # Led X position relative to the switch center
  led_pos_y: 4.7 # Led Y position relative to the switch center
  led_rotation: 0 # Led rotation

  vertical_underglow_shift: -kx + 7.8 # How much to shift underglow leds tied to keys
  vertical_diode_shift: 1.5 # How much to shift to avoid overlap
  horizontal_diode_shift: -0.5 kco - 0.85

  diode_rotation: 0 # Diode rotation
  switch_rotation: 180 # Hotswap south, led north

  top_plate_thickness: 1.3
  internal_distance_to_top_plate: 2.2

  # Physical measures
  screw_radius: 1 + small_tolerance / 2 # M2 screws
  screw_diameter: screw_radius * 2
  screw_head_radius: 2.05
  screw_head_diameter: screw_head_radius * 2
  standoff_radius: 1.575 + small_tolerance / 2 # M2 standoffs https://keeb.io/products/m2-screws-and-standoffs
  standoff_diameter: standoff_radius * 2 # 3.15 + 0.2
  pwr_trace_width: 0.25 # 1A(0.25mm), 2A(0.8mm)
  gnd_trace_width: 0.25
  signal_trace_width: 0.15
  via_size: 0.56 # JLCPCB min 0.56 | KiCad default 0.8
  via_drill: 0.3 # JLCPCB min 0.3 | KiCad default 0.4

  case_wall_thickness: 0.5
  bottom_plate_thickness: 1.0
  internal_distance_to_bottom_plate: 4

  mcu_margin_right: 0.5
  mcu_margin_top: 0.55kx

points:
  zones:
    main:
      anchor.shift: [100, -100] # Fix KiCad placement
      key.tags: [main_key, key]
      columns:
        inner.key:
          tags: [key_1u]
        index.key:
          tags: [key_1u]
          column_net: C4
        middle.key:
          tags: [key_1u]
          column_net: C3
          spread: kx + 4
          stagger: 0.45kx
          splay: 0
          origin: [-0.5kx, -0.5ky]
        ring.key:
          tags: [key_1u]
          column_net: C2
          spread: kx + 6
          stagger: -0.1kx
          splay: -2.5
          origin: [-0.5kx, -0.5ky]
        pinky.key:
          tags: [key_1u]
          column_net: C1
          spread: kx + 4.5
          stagger: -0.55kx
          splay: -2.5
        outer:
          key:
            tags: [key_1_25u]
            column_net: C0
            stagger: 0.5ky
            padding: 1.25ky
          rows:
            home:
              adjust:
                rotate: -90
            bottom:
              adjust:
                rotate: -90
            top.skip: true
      rows:
        bottom.row_net: R2
        home.row_net: R1
        top.row_net: R0

    thumb:
      anchor:
        ref: main_inner_bottom
        shift: [-1.3kx, -1.8ky]
        rotate: 12
      key:
        tags: [key, thumb_key, key_1_25u]
        rotate: -90
        origin: [-0.5kx, -0.5ky]

      columns:
        outer.key:
        middle.key:
          stagger: 3
          splay: -3
        inner.key:
          stagger: 6
          splay: -12
          shift: [0.5, -2]
      rows.home.row_net: R3

    # helper points
    svg_viewport_fix1:
      key.tags: [viewport_fix]
      anchor:
        ref: main_inner_top
        shift: [-45, 30]

    svg_viewport_fix2:
      key.tags: [viewport_fix]
      anchor:
        ref: main_inner_bottom
        shift: [-45, -55]

    screw_mount_center:
      key.tags: [helper, screw]
      anchor:
        - ref: main_middle_home
          shift: [11.95, -10]

    screw_mount_tr:
      key.tags: [helper, screw]
      anchor:
        - ref: screw_mount_center
          shift: [22.5, 22.5]

    screw_mount_br:
      key.tags: [helper, screw]
      anchor:
        - ref: screw_mount_center
          shift: [22.5, -22.5]

    screw_mount_tl:
      key.tags: [helper, screw]
      anchor:
        - ref: screw_mount_center
          shift: [-22.5, 22.5]

    screw_mount_bl:
      key.tags: [helper, screw]
      anchor:
        - ref: screw_mount_center
          shift: [-22.5, -22.5]

    standoff_middle_thumb:
      key.tags: [helper, screw, standoff]
      anchor:
        - ref: thumb_middle_home
          shift: [-2, 0.5kx + 0.7]

    standoff_lt:
      key.tags: [helper, standoff, screw]
      anchor:
        - aggregate:
            parts:
              - ref: main_inner_top
              - ref: main_index_top
              - ref: main_inner_home
              - ref: main_index_home

    standoff_lb:
      key.tags: [helper, standoff, screw]
      anchor:
        - aggregate:
            parts:
              - ref: main_inner_home
              - ref: main_index_home
              - ref: main_inner_bottom
              - ref: main_index_bottom

    standoff_rtr:
      key.tags: [helper, standoff, screw]
      anchor:
        - aggregate:
            parts:
              - ref: main_pinky_top
              - ref: main_pinky_home
          shift: [0.5kx - 0.55, 0]

    standoff_rbr:
      key.tags: [helper, standoff, screw]
      anchor:
        - aggregate:
            parts:
              - ref: main_pinky_home
              - ref: main_pinky_bottom
          shift: [0.5kx - 0.55, 0]

    standoff_rtl:
      key.tags: [helper, standoff, screw]
      anchor:
        - aggregate:
            parts:
              - ref: main_pinky_top
              - ref: main_pinky_home
          shift: [-0.5kx + 0.55, 0]

    standoff_rbl:
      key.tags: [helper, standoff, screw]
      anchor:
        - aggregate:
            parts:
              - ref: main_pinky_home
              - ref: main_pinky_bottom
          shift: [-0.5kx + 0.55, 0]

    mcu_top_right:
      key:
        tags: [helper]
        height: 0
        width: 0
      anchor:
        ref: main_inner_top
        shift: [-0.5kx - mcu_margin_right, 0.5ky - mcu_margin_top]

    mcu_top_left:
      key.tags: [helper]
      anchor:
        ref: mcu_top_right
        shift: [-18, 0]

    mcu_bottom_right:
      key.tags: [helper]
      anchor:
        ref: mcu_top_right
        shift: [0, -33.4]
    mcu_bottom_left:
      key.tags: [helper]
      anchor:
        ref: mcu_top_left
        shift: [0, -33.4]

    mcu_center:
      key.tags: [helper]
      anchor:
        aggregate:
          parts:
            - ref: mcu_bottom_left
            - ref: mcu_top_left
            - ref: mcu_top_right
            - ref: mcu_bottom_right

    screw_mcu_right:
      key.tags: [helper, screw, standoff]
      anchor:
        - ref: mcu_top_right
          shift: [-2.5, 2.25]

    screw_mcu_left:
      key.tags: [helper, screw, standoff]
      anchor:
        - ref: mcu_bottom_left
          shift: [2.5, -2.25]

    screw_outer_thumb:
      key.tags: [helper, screw]
      anchor:
        - ref: screw_mcu_left
          shift: [0, -14]

outlines:
  _viewport_fix:
    - what: rectangle
      where: [viewport_fix]
      size: 5

  _grid:
    - what: rectangle
      where: [key_1u]
      size: [kx, ky]
      operation: stack
    - what: rectangle
      where: [key_1_25u]
      size: [1.25ky, kx]
      operation: stack
    - what: rectangle
      where: [key_1_5u]
      size: [1.5ky, kx]
      operation: stack

  _keycaps:
    # center dot
    - what: rectangle
      where: [key]
      #operation: stack
      size: [10, 4]
      adjust:
        shift: [0, 0]
    - what: rectangle
      where: [key]
      size: [3.2, 4]
      adjust:
        shift: [0, -1.2]
    - what: circle
      where: [key]
      operation: stack
      radius: 1.6
    - what: rectangle
      where: [key]
      operation: stack
      size: [1.2, 3]
      adjust:
        shift: [-2.85, 0]
    - what: rectangle
      where: [key]
      operation: stack
      size: [1.2, 3]
      adjust:
        shift: [2.85, 0]
      # 1u
    - what: rectangle
      where: [key_1u]
      operation: stack
      size: [kch, kcw]
      corner: 1.5
    - what: rectangle
      where: [key_1u]
      operation: stack
      size: [kch - 2.5, kcw - 2.5]
      corner: 1
      # 1.25u
    - what: rectangle
      where: [key_1_25u]
      operation: stack
      size: [kch, 1.25kcw]
      corner: 1.5
      adjust:
        rotate: -90
    - what: rectangle
      where: [key_1_25u]
      operation: stack
      size: [kch - 2.5, 1.25kcw - 2.5]
      corner: 1
      adjust:
        rotate: -90
      # 1.5u
    - what: rectangle
      where: [key_1_5u]
      operation: stack
      size: [kch, 1.5kcw]
      corner: 1.5
      adjust:
        rotate: -90
    - what: rectangle
      where: [key_1_5u]
      operation: stack
      size: [kch - 2.5, 1.5kcw - 2.5]
      corner: 1
      adjust:
        rotate: -90
  _screws:
    - what: circle
      where: [screw]
      radius: screw_radius

  _screwheads:
    - what: circle
      where: [screw]
      radius: screw_head_radius
      operation: stack

  _standoffs:
    - what: circle
      where: [standoff]
      radius: standoff_radius
      operation: stack

  _switches:
    - what: rectangle
      where: [key]
      size: 15

  _switch_cutouts:
    - what: rectangle
      where: [key]
      size: kco

  _tentingpuck:
    - what: circle
      where: tp_center
      radius: 20.55

  _outline_shape_thumb_addon:
    - what: circle
      where: main_middle_home
      radius: 140
      adjust:
        shift: [-76.5, 72.5]
      operation: stack
    - what: rectangle
      where: main_inner_home
      size: [400, 250]
      adjust:
        shift: [0, 100]
      operation: subtract
    - what: rectangle
      where: main_inner_bottom
      size: [100, 100]
      adjust:
        shift: [-85, -35]
      operation: subtract

  _outline_shape_inner_curve:
    - what: circle
      where: main_middle_home
      radius: 44
      adjust:
        shift: [24.2, -82.8]
    - what: rectangle
      where: main_middle_bottom
      size: [20, 7]
      adjust:
        shift: [20, -18.65]
      operation: subtract

  _main_raw:
    - what: rectangle
      where: main_inner_home
      size: [180, 140]
      adjust:
        shift: [40, 39.25]
    - what: circle
      where: main_middle_home
      operation: intersect
      radius: 160
      adjust:
        shift: [2, -134.25]
    - +_outline_shape_thumb_addon
    - what: rectangle
      where: main_inner_home
      operation: subtract
      size: [40, 50]
      adjust:
        shift: [-48.1, 25]
    - what: circle
      where: main_inner_home
      operation: subtract
      radius: 200
      adjust:
        shift: [-227.25, 5]
    - what: rectangle
      where: thumb_outer_home
      operation: subtract
      size: [60, 20]
      adjust:
        shift: [0, -20/2 - 0.5ky]
    - what: rectangle
      where: main_outer_home
      operation: subtract
      size: [115, 40]
      adjust:
        shift: [0, 40/2 + 0.5ky]
    # - what: rectangle
    #   where: mcu_top_left
    #   operation: add
    #   size: [20, 5]
    #   adjust:
    #     shift: [8.5, 2]
    # - what: rectangle
    #   where: mcu_top_left
    #   operation: subtract
    #   size: [10, 20]
    #   adjust:
    #     shift: [-5.3, -4.5]
    # - what: rectangle
    #   where: mcu_top_left
    #   operation: subtract
    #   size: [20, 10]
    #   adjust:
    #     shift: [8.5, 9]
    # - what: rectangle
    #   where:
    #     aggregate:
    #       parts:
    #         - ref: mcu_top_left
    #         - ref: mcu_top_right
    #   operation: subtract
    #   size: [7.5, 5]
    #   adjust:
    #     shift: [0, 2.75]

  _main_curve_inner_corner0:
    - what: rectangle
      where: main_middle_bottom
      size: [40, 20]
      adjust:
        rotate: 17
        shift: [8, -18]
    - what: outline
      name: _main_raw
      operation: intersect

  _main_curve_inner_corner1:
    - what: outline
      name: _main_curve_inner_corner0
      fillet: 15

  _main0:
    - what: outline
      name: _main_raw
      fillet: 1.5
    - what: outline
      name: _main_curve_inner_corner1

  _main:
    - what: outline
      name: _main0
      expand: 0.5

  _mcu_raw:
    - what: rectangle
      where: mcu_center
      size: [18, 33.4]

  _mcu:
    - what: outline
      name: _mcu_raw
      fillet: 1.75

  _debug_points:
    - what: rectangle
      where: true
      size: [3, 0.01]
      adjust:
        rotate: 45
    - what: rectangle
      where: true
      size: [0.01, 3]
      adjust:
        rotate: 45
      operation: stack
    - what: circle
      where: true
      radius: 0.4
      adjust:
        shift: [1.15, 1.15]

  edgecut:
    - ^_main

  debug_preview:
    - ^_viewport_fix
    - ^_grid
    - ^_debug_points
    - ^_switches
    - ^_switch_cutouts
    - ^_main_raw
    - ^_mcu
    - ^_screws
    - ^_standoffs
    #- ^_screwheads

  preview:
    - ^_viewport_fix
    - ^_keycaps
    #- ^_edgecut
    - ^_mcu
    #- ^_switches
    - ^_screwheads
